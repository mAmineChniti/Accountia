services:
  mysql:
    image: mysql:8.0
    container_name: accountia-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: ${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
      MYSQL_ROOT_HOST: ${MYSQL_ROOT_HOST:-%}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-accountia}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accountia-network

  postgres:
    image: postgres:15
    container_name: accountia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accountia_reporting}
      POSTGRES_USER: ${POSTGRES_USER:-accountia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accountia}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accountia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accountia-network

  redis:
    image: redis:7-alpine
    container_name: accountia-redis
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accountia-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: accountia-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - accountia-network

  # =====================================================
  # KEYCLOAK — Identity Provider (IAM)
  # Interface admin : http://localhost:8180
  # =====================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: accountia-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-file
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    ports:
      - "8180:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/realm-accountia.json:/opt/keycloak/data/import/realm-accountia.json
      - ./keycloak/themes:/opt/keycloak/themes
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/8080; echo -e 'GET /realms/accountia HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - accountia-network

  # =====================================================
  # EUREKA SERVICE DISCOVERY
  # =====================================================
  eureka-server:
    build: ./eureka-server
    container_name: accountia-eureka
    environment:
      - SERVER_PORT=8761
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - accountia-network

  # =====================================================
  # API GATEWAY
  # =====================================================
  api-gateway:
    build: ./api-gateway
    container_name: accountia-api-gateway
    environment:
      - SERVER_PORT=8080
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - EUREKA_SERVICE_URL=http://admin:admin@eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/accountia
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/accountia/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  # =====================================================
  # FRONTEND (Next.js)
  # Code source: ../accountia-web
  # =====================================================
  frontend:
    build:
      context: ../accountia-web
      dockerfile: ../Accountia-client-ms/frontend.Dockerfile
      args:
        NEXT_PUBLIC_BACKEND: http://localhost:8080
    container_name: accountia-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  # =====================================================
  # MICROSERVICES
  # =====================================================
  auth-ms:
    build: ./auth-ms
    container_name: accountia-auth
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EUREKA_SERVICE_URL=http://admin:admin@eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/accountia
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/accountia/protocol/openid-connect/certs
      - JPA_DDL_AUTO=update
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-admin}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  business-ms:
    build: ./business-ms
    container_name: accountia-business
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET}
      - EUREKA_SERVICE_URL=http://admin:admin@eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/accountia
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/accountia/protocol/openid-connect/certs
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  client-ms:
    build: ./client-ms
    container_name: accountia-client
    environment:
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JPA_DDL_AUTO=update
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET}
      - EUREKA_SERVICE_URL=http://admin:admin@eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/accountia
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/accountia/protocol/openid-connect/certs
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  invoice-ms:
    build: ./invoice-ms
    container_name: accountia-invoice
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JPA_DDL_AUTO=update
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET}
      - EUREKA_SERVICE_URL=http://admin:admin@eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/accountia
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/accountia/protocol/openid-connect/certs
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  expense-ms:
    build: ./expense-ms
    container_name: accountia-expense
    environment:
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - SECURITY_JWT_SECRET=${SECURITY_JWT_SECRET}
      - EUREKA_SERVICE_URL=http://admin:admin@eureka-server:8761/eureka/
      - KEYCLOAK_ISSUER_URI=http://localhost:8180/realms/accountia
      - KEYCLOAK_JWK_SET_URI=http://keycloak:8080/realms/accountia/protocol/openid-connect/certs
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - accountia-network

  reporting-ms:
    build: ./reporting-ms
    container_name: accountia-reporting
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-accountia_reporting}
      - POSTGRES_USER=${POSTGRES_USER:-accountia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-accountia}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - accountia-network

networks:
  accountia-network:
    driver: bridge

volumes:
  mysql-data:
  postgres-data:
  redis-data:
  keycloak-data: