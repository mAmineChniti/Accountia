# CI profile: H2 in-memory database, Flyway disabled, all external services off
spring:
  config:
    import: ""

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  main:
    lazy-initialization: true
    allow-bean-definition-overriding: true

  cloud:
    discovery:
      enabled: false

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # Hibernate manages the H2 schema directly
    show-sql: false

  flyway:
    enabled: false            # Flyway SQL uses MySQL syntax, skip for H2

  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    enabled: false

ai:
  openai:
    enabled: false

management:
  health:
    rabbit:
      enabled: false

logging:
  level:
    com.accountia.invoice: INFO
    org.springframework.security: WARN
