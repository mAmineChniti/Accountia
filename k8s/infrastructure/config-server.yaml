apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: accountia
  labels:
    app: config-server
    component: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
        component: infrastructure
    spec:
      containers:
      - name: config-server
        image: accountia/config-server:latest
        ports:
        - containerPort: 8888
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "native"
        - name: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
          value: "file:/config"
        - name: SERVER_PORT
          value: "8888"
        # Environment variables for config resolution
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: SPRING_DATASOURCE_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: accountia-secrets
              key: SPRING_DATASOURCE_PASSWORD
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: RABBITMQ_HOST
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: RABBITMQ_PORT
        - name: RABBITMQ_USERNAME
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: RABBITMQ_USERNAME
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: accountia-secrets
              key: RABBITMQ_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: REDIS_PORT
        - name: EUREKA_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: accountia-config
              key: EUREKA_SERVICE_URL
        - name: SECURITY_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: accountia-secrets
              key: SECURITY_JWT_SECRET
        volumeMounts:
        - name: config-volume
          mountPath: /config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config-volume
        configMap:
          name: accountia-config-server-files
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: accountia
  labels:
    app: config-server
    component: infrastructure
spec:
  type: ClusterIP
  ports:
  - port: 8888
    targetPort: 8888
    protocol: TCP
    name: http
  selector:
    app: config-server
