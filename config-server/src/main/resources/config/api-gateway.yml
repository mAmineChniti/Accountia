# API Gateway Configuration
server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # Data Redis for session management
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
            - SecureHeaders=X-Content-Type-Options,X-Frame-Options,Strict-Transport-Security
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: ${CORS_ALLOWED_ORIGINS}
                allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: auth-ms
              uri: lb://auth-ms
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=0
            - id: business-ms
              uri: lb://business-ms
              predicates:
                - Path=/api/business/**
              filters:
                - StripPrefix=0
            - id: invoice-ms
              uri: lb://invoice-ms
              predicates:
                - Path=/api/invoices/**
              filters:
                - StripPrefix=0
            - id: client-ms
              uri: lb://client-ms
              predicates:
                - Path=/api/client/**
              filters:
                - StripPrefix=0
            - id: expense-ms
              uri: lb://expense-ms
              predicates:
                - Path=/api/expense/**
              filters:
                - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL}
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: false
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: never
    gateway:
      access: unrestricted
  health:
    defaults:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
