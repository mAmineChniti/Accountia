server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: file:/config
        health:
          repositories:
            accountia:
              label: main
              name: accountia
              profiles: dev,prod,test
        # Enable environment variable resolution by setting system properties
        override-system-properties: true
  profiles:
    active: native

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,configprops
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.config: DEBUG
